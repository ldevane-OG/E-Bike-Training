<script>
// ─────────────────────────────────────────────────────────────
//  CHAPTERS DATA
// ─────────────────────────────────────────────────────────────
const chapters = [

  // 1. WELCOME
  {
    title: "Welcome & Purpose",
    narration: `Welcome to Brake Lock-Up Reporting — a training built specifically for you as a call center agent. Whether you've taken a few hundred calls or a few thousand, brake-related complaints are among the trickier ones to navigate. The customer is often upset, the language they use can be vague, and the underlying cause isn't always what it sounds like. This training will help you confidently identify what's really going on, ask the right questions, and handle these calls with both accuracy and empathy. By the end, you'll understand how the brake system actually works, recognize the most common scenarios that get reported as lock-ups, and know exactly when to escalate. Let's get started.`,
    render: () => `
      <div class="slide-header">
        <span class="ch-badge">Chapter 1</span>
        <h2>Welcome &amp; Purpose</h2>
      </div>
      <div class="slide-body">
        <div class="callout blue-bg">
          <strong>About This Training</strong>
          This course will help you correctly interpret brake 'lock-up' complaints and follow the right intake process — every time.
        </div>
        <div class="info-block">
          <h3>What You'll Be Able to Do</h3>
          <ul>
            <li>Understand how e-bike mechanical brake systems actually work</li>
            <li>Recognize the common riding scenarios that get reported as lock-ups</li>
            <li>Use a structured discovery script to gather the right facts</li>
            <li>Know exactly when a case needs to be escalated for engineering review</li>
          </ul>
        </div>
        <div class="callout orange-bg">
          <strong>Why This Matters</strong>
          Brake reports carry real stakes — for the customer's safety, for your team's accuracy, and for the brand's reputation. Getting this right makes a difference.
        </div>
      </div>`
  },

  // 2. WHAT CUSTOMERS MEAN
  {
    title: "What 'Lock-Up' Really Means",
    narration: `Here's something important to keep in mind from the very start: when a customer says their brakes locked up, they are almost always describing a feeling — not confirming a mechanical failure. The phrase "lock-up" gets used to describe a sudden stop, a loss of control, a lurch forward, or sometimes just a really abrupt deceleration that startled them. It does not automatically mean there's something broken on the bike. Your job at the start of every call is to listen past the label and understand what the rider actually experienced. A customer saying "my brakes locked up" is a starting point, not a diagnosis. Keep that mindset as you go through the discovery process.`,
    render: () => `
      <div class="slide-header">
        <span class="ch-badge">Chapter 2</span>
        <h2>What 'Lock-Up' Really Means</h2>
      </div>
      <div class="slide-body">
        <div class="callout aqua-bg">
          <strong>Key Insight</strong>
          Customers describe the <em>sensation</em> they experienced — not a confirmed mechanical condition. "Lock-up" is a starting point, not a diagnosis.
        </div>
        <div class="info-block aqua">
          <h3>What Customers May Be Describing</h3>
          <ul>
            <li>A sudden, jarring stop that felt uncontrolled</li>
            <li>Loss of balance or control during braking</li>
            <li>Going over the handlebars or nearly doing so</li>
            <li>A wheel that stopped spinning unexpectedly</li>
            <li>General fear or alarm from a braking event</li>
          </ul>
        </div>
        <div class="callout orange-bg">
          <strong>Your Role</strong>
          Listen past the label. Understand what actually happened before drawing any conclusions about the cause.
        </div>
      </div>`
  },

  // 3. BRAKE SYSTEM BASICS
  {
    title: "Mechanical Brake System Basics",
    narration: `To handle these calls well, you need a solid mental model of how the brake system actually works — and just as importantly, what it can't do. E-bike mechanical disc brakes require direct input from the rider. The rider squeezes the lever, that cable tension pulls the brake caliper, and the caliper clamps down on the rotor to slow the wheel. There is no automatic engagement. The brakes cannot apply themselves. Now here's the part that surprises some people: the electric motor in an e-bike is a forward-assist system only. It helps the rider go — it does not apply the brakes. The motor cannot lock the wheels. So if a customer tells you the bike's motor caused the wheel to lock, that's not mechanically possible. The motor and the brake system are completely separate. Keeping these two facts clear will help you guide the conversation in the right direction.`,
    render: () => `
      <div class="slide-header">
        <span class="ch-badge">Chapter 3</span>
        <h2>Mechanical Brake System Basics</h2>
      </div>
      <div class="slide-body">
        <div class="two-col">
          <div class="info-block">
            <h3>Mechanical Disc Brakes</h3>
            <ul>
              <li>Require direct rider lever input to engage</li>
              <li>Cannot apply braking force without input</li>
              <li>Do not auto-engage under any condition</li>
              <li>Cable pulls caliper → clamps rotor → slows wheel</li>
            </ul>
          </div>
          <div class="info-block orange">
            <h3>Electric Motor System</h3>
            <ul>
              <li>Provides forward pedal-assist only</li>
              <li>Has no connection to the brake system</li>
              <li>Cannot apply braking force</li>
              <li>Cannot cause wheels to lock — mechanically impossible</li>
            </ul>
          </div>
        </div>
        <div class="callout green-bg">
          <strong>Bottom Line</strong>
          Brakes and the electric motor are completely separate systems. If a customer believes the motor caused a lock-up, that is a misconception to gently address during the call.
        </div>
      </div>`
  },

  // 4. BICYCLE PHYSICS
  {
    title: "Bicycle Physics During Hard Braking",
    narration: `Let's talk physics — because understanding what happens to a bike during sudden braking will help you recognize the most common call type you'll receive. When a rider applies the front brake hard, the bike decelerates rapidly. That rapid deceleration causes the rider's weight — and the bike's weight — to shift forward. As weight transfers to the front wheel, the rear wheel becomes light. If the deceleration is sharp enough, the rear wheel will actually lift off the ground. This is called a nose-over or endo. From the rider's perspective, it can feel like the bike suddenly stopped, the front locked up, or they were "thrown" over the handlebars. In reality, physics did exactly what physics does. Understanding this chain of events — front brake applied, deceleration, weight shift, rear lift — is the foundation for recognizing the most common scenario you'll encounter.`,
    render: () => `
      <div class="slide-header">
        <span class="ch-badge">Chapter 4</span>
        <h2>Bicycle Physics During Hard Braking</h2>
      </div>
      <div class="slide-body">
        <div class="callout blue-bg">
          <strong>The Nose-Over Effect</strong>
          Hard front braking causes weight to transfer forward — potentially lifting the rear wheel and pitching the rider over the handlebars.
        </div>
        <div class="flow-steps">
          <div class="flow-step">
            <div class="step-num">1</div>
            <div class="step-content">
              <h4>Front brake applied</h4>
              <p>Rider squeezes the front lever — braking force engages the front rotor.</p>
            </div>
          </div>
          <div class="flow-step">
            <div class="step-num">2</div>
            <div class="step-content">
              <h4>Rapid deceleration</h4>
              <p>The bike slows quickly — momentum continues to carry rider and bike mass forward.</p>
            </div>
          </div>
          <div class="flow-step">
            <div class="step-num">3</div>
            <div class="step-content">
              <h4>Weight shifts forward</h4>
              <p>Inertia transfers weight toward the front contact point — rear becomes light.</p>
            </div>
          </div>
          <div class="flow-step">
            <div class="step-num">4</div>
            <div class="step-content">
              <h4>Rear wheel may lift</h4>
              <p>In extreme cases the rear wheel leaves the ground — the rider experiences a nose-over or pitches forward.</p>
            </div>
          </div>
        </div>
      </div>`
  },

  // 5. COMMON SCENARIOS
  {
    title: "Common Reported Scenarios",
    narration: `Now that you understand the physics, let's walk through the three scenarios that most frequently get reported as brake lock-ups. The first is sudden front braking — the rider grabs the front brake hard, typically in a panic stop situation, and the deceleration causes them to pitch forward. They describe it as a lock-up because the stop was so abrupt. The second scenario is obstacles. The front wheel hits a curb, a pothole, or another object. The wheel stops abruptly, but the rider's momentum continues forward. They feel like the bike "locked up" when in reality the wheel stopped because of a physical obstruction. The third scenario is soft terrain. Riding on sand, gravel, mud, or wet grass can cause a wheel to lose traction and decelerate quickly — creating the same sensation of sudden stoppage without any mechanical engagement. In all three cases, the customer's description is accurate from their perspective, but the root cause is not a mechanical failure.`,
    render: () => `
      <div class="slide-header">
        <span class="ch-badge">Chapter 5</span>
        <h2>Common Reported Scenarios</h2>
      </div>
      <div class="slide-body">
        <div class="scenario-visual">
          <span class="icon">🚲</span>
          <h3>Sudden Front Braking</h3>
          <p>Rider applies front brake hard — rapid deceleration creates the sensation of locking. The bike is functioning correctly; weight transfer causes the forward pitch.</p>
        </div>
        <div class="two-col">
          <div class="scenario-visual" style="margin-bottom:0;">
            <span class="icon">🪨</span>
            <h3>Obstacle Impact</h3>
            <p>Front wheel contacts a curb, pothole, or debris. Wheel stops abruptly; rider's momentum continues forward, creating a perceived lock-up.</p>
          </div>
          <div class="scenario-visual" style="margin-bottom:0;">
            <span class="icon">🏖️</span>
            <h3>Soft / Slippery Terrain</h3>
            <p>Sand, gravel, mud, or wet grass causes rapid wheel deceleration through traction loss — same end sensation, no mechanical involvement.</p>
          </div>
        </div>
      </div>`
  },

  // 6. CONTRIBUTING FACTORS

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let current   = 0;
let playing   = false;
let captionOn = false;
let utterance = null;
let utteranceStartMs   = 0;
let elapsedBeforePause = 0;

const completedSet = new Set();

// ─────────────────────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────────────────────
const slideArea   = document.getElementById('slide-area');
const chapterList = document.getElementById('chapter-list');
const progressBar = document.getElementById('progress-bar');
const btnPlay     = document.getElementById('btn-play');
const btnPrev     = document.getElementById('btn-prev');
const btnNext     = document.getElementById('btn-next');
const btnCaption  = document.getElementById('btn-caption');
const speedSelect = document.getElementById('speed-select');
const captionBox  = document.getElementById('caption-box');
const chIndic     = document.getElementById('chapter-indicator');

// ─────────────────────────────────────────────────────────────
//  VOICE LOADER — Google US English (fixed)
// ─────────────────────────────────────────────────────────────
let selectedVoice = null;

function setGoogleUSVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return;
  selectedVoice = voices.find(v => v.name === 'Google US English')
               || voices.find(v => v.lang === 'en-US')
               || voices[0];
}

setGoogleUSVoice();
if (window.speechSynthesis.onvoiceschanged !== undefined) {
  window.speechSynthesis.onvoiceschanged = setGoogleUSVoice;
}

// ─────────────────────────────────────────────────────────────
//  BUILD SIDEBAR
// ─────────────────────────────────────────────────────────────
function buildSidebar() {
  chapterList.innerHTML = '';
  chapters.forEach((ch, i) => {
    const item = document.createElement('div');
    item.className = 'ch-item' +
      (i === current ? ' active' : '') +
      (completedSet.has(i) && i !== current ? ' done' : '');
    item.innerHTML = `<div class="ch-num">${i + 1}</div><div class="ch-label">${ch.title}</div>`;
    item.addEventListener('click', () => { stopNarration(); goTo(i); });
    chapterList.appendChild(item);
  });
}

// ─────────────────────────────────────────────────────────────
//  RENDER SLIDE
// ─────────────────────────────────────────────────────────────
function renderSlide() {
  const ch = chapters[current];
  slideArea.innerHTML = `<div class="slide-card">${ch.render()}</div>`;
  chIndic.textContent = `Chapter ${current + 1} of ${chapters.length}`;
  const pct = ((current) / (chapters.length - 1)) * 100;
  progressBar.style.width = pct + '%';
  buildSidebar();
  slideArea.scrollTop = 0;
}

// ─────────────────────────────────────────────────────────────
//  NAV
// ─────────────────────────────────────────────────────────────
function goTo(idx) {
  completedSet.add(current);
  current = Math.max(0, Math.min(chapters.length - 1, idx));
  renderSlide();
  if (playing) { playing = false; startNarration(); playing = true; }
  else { btnPlay.textContent = '▶ Play'; }
}

btnPrev.addEventListener('click', () => { stopNarration(); goTo(current - 1); });
btnNext.addEventListener('click', () => { stopNarration(); goTo(current + 1); });

// ─────────────────────────────────────────────────────────────
//  SPEECH — Chrome-safe pause/resume
// ─────────────────────────────────────────────────────────────
function stopNarration() {
  window.speechSynthesis.cancel();
  utterance = null;
  elapsedBeforePause = 0;
  playing = false;
  btnPlay.textContent = '▶ Play';
  captionBox.textContent = '';
}

function startNarration(resumeMs) {
  window.speechSynthesis.cancel();
  const fullText = chapters[current].narration;
  let speakText  = fullText;

  if (resumeMs && resumeMs > 0) {
    const words      = fullText.split(' ');
    const totalMs    = estimateDuration(fullText);
    const ratio      = Math.min(resumeMs / totalMs, 0.95);
    const wordIdx    = Math.max(0, Math.floor(ratio * words.length) - 2);
    // walk back to nearest space
    let safeIdx = wordIdx;
    while (safeIdx > 0 && words[safeIdx - 1].slice(-1) !== ' ') safeIdx--;
    speakText = words.slice(safeIdx).join(' ');
  }

  utterance             = new SpeechSynthesisUtterance(speakText);
  utterance.rate        = parseFloat(speedSelect.value);
  if (selectedVoice) utterance.voice = selectedVoice;
  utteranceStartMs      = Date.now();

  utterance.onend = () => {
    if (!playing) return;
    completedSet.add(current);
    if (current < chapters.length - 1) {
      current++;
      renderSlide();
      elapsedBeforePause = 0;
      startNarration();
    } else {
      stopNarration();
    }
  };

  if (captionOn) {
    const words = speakText.split(' ');
    const totalEstMs = estimateDuration(speakText) / parseFloat(speedSelect.value);
    const msPerWord  = totalEstMs / words.length;
    let wordI = 0;
    const captionTick = setInterval(() => {
      if (!playing || !utterance) { clearInterval(captionTick); return; }
      const elapsed = Date.now() - utteranceStartMs;
      wordI = Math.min(Math.floor(elapsed / msPerWord), words.length - 1);
      const start = Math.max(0, wordI - 6);
      const end   = Math.min(words.length, wordI + 8);
      captionBox.innerHTML = words.slice(start, end).map((w, ii) =>
        ii === (wordI - start) ? `<mark style="background:#FF6600;color:#fff;padding:1px 3px;border-radius:3px;">${w}</mark>` : w
      ).join(' ');
    }, 120);
  }

  window.speechSynthesis.speak(utterance);
  playing = true;
  btnPlay.textContent = '⏸ Pause';
}

function estimateDuration(text) {
  // rough: ~130 words/min → ~460ms per word
  return text.split(' ').length * 460;
}

btnPlay.addEventListener('click', () => {
  if (playing) {
    // PAUSE: record elapsed, cancel
    const elapsed = Date.now() - utteranceStartMs;
    elapsedBeforePause += elapsed;
    window.speechSynthesis.cancel();
    utterance = null;
    playing = false;
    btnPlay.textContent = '▶ Play';
  } else {
    // RESUME or START
    startNarration(elapsedBeforePause > 0 ? elapsedBeforePause : 0);
  }
});

speedSelect.addEventListener('change', () => {
  if (playing) {
    const elapsed = Date.now() - utteranceStartMs;
    elapsedBeforePause += elapsed;
    window.speechSynthesis.cancel();
    utterance = null;
    playing = false;
    startNarration(elapsedBeforePause);
  }
});

btnCaption.addEventListener('click', () => {
  captionOn = !captionOn;
  btnCaption.style.background = captionOn ? '#1946BA' : '';
  btnCaption.style.color      = captionOn ? '#fff'    : '';
  captionBox.classList.toggle('visible', captionOn);
  if (!captionOn) captionBox.textContent = '';
});

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
renderSlide();
</script>
</body>
</html>
